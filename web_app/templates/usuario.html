<!DOCTYPE html>
<html>
<head>
<title>Usuario</title>
<style>
body{background:#020617;color:white;font-family:Arial}
.header{padding:15px;background:#0f172a;display:flex;justify-content:space-between}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;padding:20px}
.card{background:#1e293b;border-radius:10px}
.card img{width:100%;height:250px;object-fit:cover}
.card-body{text-align:center;padding:10px}
.loan{background:#1e293b;padding:15px;margin:10px;border-radius:10px;display:flex;justify-content:space-between}
</style>
</head>
<body>

<div class="header">
<h3>{{ session.get('user') }}</h3>
<a href="/logout" style="color:red;">Salir</a>
</div>

<form action="/buscar" method="GET" style="padding:20px;">
<input name="q" placeholder="Buscar...">
<button>Buscar</button>
</form>

<div class="grid">
{% for l in libros %}
<div class="card">
<img src="{{ url_for('static', filename='uploads/' + (l[3] or 'default.png')) }}">
<div class="card-body">
<h4>{{ l[1] }}</h4>
<p>{{ l[2] }}</p>

{% if l[4]==1 %}
<form method="POST" action="/prestar/{{ l[0] }}">
<button>Pedir</button>
</form>
{% else %}
<p style="color:red;">No disponible</p>
{% endif %}

</div>
</div>
{% endfor %}
</div>

<h2 style="padding:20px;">Mis préstamos</h2>

{% for p in prestamos %}
<div class="loan">
<div>{{ p[1] }} - {{ p[2] }}</div>

{% if p[3]==0 %}
<form method="POST" action="/devolver/{{ p[0] }}">
<button>Devolver</button>
</form>
{% else %}
<span style="color:lightgreen;">Devuelto</span>
{% endif %}
</div>
{% endfor %}

</body>
</html>
