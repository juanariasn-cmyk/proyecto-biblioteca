<h1>👑 ADMIN EMPRESA</h1>

<a href="/export">📥 Descargar reporte CSV</a>

<h2>📖 Préstamos</h2>

{% for p in prestamos %}
<div style="border:1px solid #ccc; margin:10px; padding:10px;">
{{ p[1] }} - {{ p[2] }}

{% if p[5] > 5 and p[4]==0 %}
<p style="color:red;">💸 Multa: ${{ (p[5]-5)*1000 }}</p>
{% endif %}

</div>
{% endfor %}
