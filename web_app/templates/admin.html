<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
<style>
body{background:#020617;color:white;font-family:Arial}
.section{padding:20px}
input,button{padding:10px;margin:5px}
</style>
</head>
<body>

<div class="section">
<h2>👑 Panel Admin</h2>

<form method="POST">
<input name="titulo" placeholder="Título" required>
<input name="autor" placeholder="Autor" required>
<button>Agregar libro</button>
</form>

<h3>📚 Libros</h3>
<ul>
{% for l in libros %}
<li>{{ l[1] }} - {{ l[2] }}</li>
{% endfor %}
</ul>

<a href="/logout">Salir</a>
</div>

</body>
</html>
