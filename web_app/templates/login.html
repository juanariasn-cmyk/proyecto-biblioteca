<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
    background: linear-gradient(135deg,#020617,#0f172a);
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box{
    background:#1e293b;
    padding:30px;
    border-radius:15px;
    width:300px;
    text-align:center;
}
input{
    width:90%;
    padding:10px;
    margin:10px;
    border:none;
    border-radius:8px;
}
button{
    width:95%;
    padding:10px;
    background:#22c55e;
    border:none;
    color:white;
    border-radius:8px;
    cursor:pointer;
}
.error{
    background:#ef4444;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
}
</style>

</head>

<body>

<div class="box">

<h2>📚 Biblioteca</h2>

{% if error %}
<div class="error">
    {{ error }}
</div>
{% endif %}

<form method="POST">
<input name="user" placeholder="Usuario" required>
<input type="password" name="password" placeholder="Contraseña" required>
<button>Ingresar</button>
</form>

<br>
<a href="/register" style="color:#38bdf8;">Crear cuenta</a>

</div>

</body>
</html>
