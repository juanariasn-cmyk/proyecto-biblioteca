<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white d-flex justify-content-center align-items-center vh-100">

<form method="POST" class="bg-black p-4 rounded" style="width:300px;">

<h3 class="text-center">Login</h3>

{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="alert alert-danger text-center">
{{ messages[0] }}
</div>
{% endif %}
{% endwith %}

<input name="user" class="form-control mb-2" placeholder="Usuario" required>
<input name="password" type="password" class="form-control mb-2" placeholder="Contraseña" required>

<button class="btn btn-primary w-100">Entrar</button>

<a href="/register" class="btn btn-link text-white w-100">Crear cuenta</a>

</form>

</body>
</html>
