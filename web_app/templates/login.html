<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#020617;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* CONTENEDOR */
.login-box{
    background:#1e293b;
    padding:30px;
    border-radius:12px;
    width:300px;
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

/* TITULO */
h2{
    text-align:center;
    margin-bottom:20px;
}

/* INPUTS */
input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:6px;
    outline:none;
}

/* BOTON */
button{
    width:100%;
    padding:10px;
    background:#3b82f6;
    border:none;
    color:white;
    border-radius:6px;
    cursor:pointer;
}
button:hover{
    background:#2563eb;
}

/* ERROR */
.error{
    color:#ef4444;
    text-align:center;
    margin-bottom:10px;
}
</style>

</head>

<body>

<div class="login-box">
    <h2>🔐 Iniciar sesión</h2>

    <!-- ERROR -->
    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    <!-- FORM -->
    <form method="POST">
        <input type="text" name="usuario" placeholder="Usuario" required>
        <input type="password" name="password" placeholder="Contraseña" required>
        <button type="submit">Entrar</button>
    </form>
</div>

</body>
</html>
