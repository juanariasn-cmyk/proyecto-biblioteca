<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:#020617;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* CAJA */
.box{
    background:#1e293b;
    padding:35px;
    border-radius:16px;
    width:320px;
    box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

/* TITULO */
h2{
    text-align:center;
    margin-bottom:20px;
}

/* INPUTS */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    outline:none;
    background:#0f172a;
    color:white;
}

/* BOTON */
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:linear-gradient(45deg,#3b82f6,#2563eb);
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

/* ERROR */
.error{
    color:#ef4444;
    text-align:center;
    margin-bottom:10px;
}

/* LINK */
.link{
    text-align:center;
    margin-top:15px;
    color:#94a3b8;
}

.link a{
    color:#3b82f6;
    text-decoration:none;
}

.link a:hover{
    text-decoration:underline;
}
</style>

</head>

<body>

<div class="box">

<h2>🔐 Iniciar sesión</h2>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="POST">
    <input type="text" name="usuario" placeholder="Usuario" required>
    <input type="password" name="password" placeholder="Contraseña" required>
    <button type="submit">Entrar</button>
</form>

<div class="link">
    ¿No tienes cuenta?<br>
    <a href="/registro">Crear usuario</a>
</div>

</div>

</body>
</html>
