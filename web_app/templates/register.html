<!DOCTYPE html>
<html>
<head>
    <title>Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white d-flex justify-content-center align-items-center vh-100">

<form method="POST" class="bg-black p-4 rounded" style="width:300px;">
    <h3 class="text-center mb-3">Crear cuenta</h3>

    <input name="user" class="form-control mb-2" placeholder="Usuario" required>
    <input name="password" type="password" class="form-control mb-2" placeholder="Contraseña" required>

    <button class="btn btn-success w-100">Registrarse</button>

    <a href="/" class="btn btn-link text-white w-100">Volver al login</a>
</form>

</body>
</html>
