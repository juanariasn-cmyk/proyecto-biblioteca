<!DOCTYPE html>
<html>
<head>
    <title>Panel Biblioteca</title>
    <style>
        body { font-family: Arial; background: #0f172a; color: white; }
        h1 { text-align: center; }
        .container { width: 80%; margin: auto; }
        input, button { padding: 10px; margin: 5px; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid gray; }
        a { color: red; }
        .box { background: #1e293b; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 Panel Biblioteca</h1>

    <div class="box">
        <form action="/add" method="POST">
            <input type="text" name="nombre" placeholder="Nombre del libro" required>
            <input type="text" name="autor" placeholder="Autor" required>
            <button type="submit">Agregar</button>
        </form>
    </div>

    <div class="box">
        <h2>Libros</h2>
        <table>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Autor</th>
                <th>Acción</th>
            </tr>

            {% for libro in libros %}
            <tr>
                <td>{{ libro[0] }}</td>
                <td>{{ libro[1] }}</td>
                <td>{{ libro[2] }}</td>
                <td><a href="/delete/{{ libro[0] }}">Eliminar</a></td>
            </tr>
            {% endfor %}
        </table>
    </div>

    <br>
    <a href="/logout">Cerrar sesión</a>
</div>

</body>
</html>
