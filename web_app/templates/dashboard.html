<!DOCTYPE html>
<html>
<head>
<title>Biblioteca</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#0b0b0b; color:white; }
.card { background:#181818; border-radius:12px; }
</style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">
<span>📚 Biblioteca</span>
<div>
<span>{{ session['user'] }} ({{ rol }})</span>
<a href="/logout" class="btn btn-danger btn-sm">Salir</a>
</div>
</nav>

<div class="container mt-4">

<!-- FORM ADMIN -->
{% if rol == "admin" %}
<form action="/add" method="POST" class="mb-4">
<input name="nombre" placeholder="Nombre" class="form-control mb-2" required>
<input name="autor" placeholder="Autor" class="form-control mb-2" required>
<input name="imagen" placeholder="URL imagen" class="form-control mb-2" required>
<button class="btn btn-success w-100">Agregar libro</button>
</form>
{% endif %}

<div class="row">

{% for libro in libros %}
<div class="col-md-3 mb-4">
<div class="card p-2 text-center">

<img src="{{ libro[3] }}" style="width:100%; height:150px; object-fit:cover">

<h5>{{ libro[1] }}</h5>

{% if libro[0] in prestados %}
<a href="/devolver/{{ libro[0] }}" class="btn btn-success btn-sm">Devolver</a>
{% else %}
<a href="/prestar/{{ libro[0] }}" class="btn btn-warning btn-sm">Prestar</a>
{% endif %}

</div>
</div>
{% endfor %}

</div>

</div>

</body>
</html>
